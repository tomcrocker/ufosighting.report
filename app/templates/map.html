{% extends "base.html" %}
{% block title %}Sightings map — ufosighting.report{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script defer src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script defer src="/static/js/map.js?v={{ static_v }}"></script>
{% endblock %}
{% block content %}
<h1>Sightings map</h1>
<p class="muted">Only sightings with a location pin appear here.</p>
<form class="filters" id="map-filters" onsubmit="return false;">
  <input type="date" name="from" id="map-from">
  <input type="date" name="to" id="map-to">
  <select name="shape" id="map-shape">
    <option value="">Any shape</option>
    {% for sh in shapes %}<option value="{{ sh }}">{{ sh | capitalize }}</option>{% endfor %}
  </select>
  <button class="btn" id="map-apply">Apply</button>
  <button class="btn" id="map-clear" type="button">Clear</button>
</form>
<div id="map"></div>
{% endblock %}
